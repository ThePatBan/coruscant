# Coruscant local stack:
#   ingest  one-shot lifecycle run that populates the shared data volume
#   api     FastAPI service that loads the persisted corpus on startup
#   web       nginx serving the customer console SPA, reverse-proxying /api -> api
#   admin     nginx serving the internal admin SPA, reverse-proxying /api -> api
#   marketing nginx serving the static public marketing site (no /api)
#
# Usage:  docker compose up --build      then open http://localhost:8080 (console),
#                                          http://localhost:8081 (internal admin), and
#                                          http://localhost:8082 (marketing)
services:
  ingest:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: coruscant-api:local
    command: ["coruscant", "ingest"]
    environment:
      CORUSCANT_DATA_DIR: /data
      CORUSCANT_DATABASE_URL: sqlite:////data/coruscant.db
      CORUSCANT_CONFIG_DIR: /app/config
      # Demo account is an explicit opt-in for this local stack only.
      CORUSCANT_SEED_DEMO_USER: "true"
      CORUSCANT_DEMO_PASSWORD: coruscant-demo
    volumes:
      - coruscant-data:/data
    restart: "no"

  api:
    image: coruscant-api:local
    command: ["uvicorn", "coruscant.apps.api:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      CORUSCANT_DATA_DIR: /data
      CORUSCANT_DATABASE_URL: sqlite:////data/coruscant.db
      CORUSCANT_CONFIG_DIR: /app/config
      # Supply a strong secret for stable, secure tokens; falls back to an
      # ephemeral per-process secret if unset (never a committed constant).
      CORUSCANT_SECRET_KEY: ${CORUSCANT_SECRET_KEY:-}
      # Restrict CORS to the web origin (the API port is also published directly).
      CORUSCANT_CORS_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'
    volumes:
      - coruscant-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      ingest:
        condition: service_completed_successfully
    healthcheck:
      # Gate on /readyz (deep readiness), not /health (liveness): the web tier waits
      # until the API's graph + corpus actually answer, so no request is proxied to a
      # not-yet-ready backend. urlopen raises on a 503, which fails the check.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./apps/console
      dockerfile: Dockerfile
    image: coruscant-web:local
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # Internal admin console (admin.coruscant.com). Same-origin /api proxy as the console;
  # staff-only access is enforced by the API (`require_admin`), not by this container.
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    image: coruscant-admin:local
    ports:
      - "8081:80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # Public marketing site (coruscant.com). Fully static — no backend of its own; its CTAs
  # link out to the console, so it does not depend on the api service.
  marketing:
    build:
      context: ./apps/marketing
      dockerfile: Dockerfile
    image: coruscant-marketing:local
    ports:
      - "8082:80"
    restart: unless-stopped

volumes:
  coruscant-data:
