services:
  api:
    image: python:3.11-slim
    working_dir: /workspace
    command: ["python", "-m", "uvicorn", "coruscant.apps.api:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
  worker:
    image: python:3.11-slim
    working_dir: /workspace
    command: ["python", "-m", "coruscant.apps.worker"]
    volumes:
      - ./:/workspace
