server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Internal tool — keep it out of search indexes at the edge as well.
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Gzip static assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Reverse-proxy the API so the admin SPA talks to a same-origin /api (no CORS).
    # The trailing rewrite strips the /api/ prefix. This is the exact-origin access
    # model for admin.coruscant.com: the app only ever calls its own origin.
    location /api/ {
        # Use Docker's embedded DNS and re-resolve so the api container can be
        # recreated without restarting nginx. A variable in proxy_pass disables
        # nginx's automatic prefix stripping, so strip /api/ explicitly first.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_api http://api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Long-cache hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
