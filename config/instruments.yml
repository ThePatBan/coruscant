# Non-equity instruments in the inventory (curated, real, public).
#
# Commodities carry a Yahoo futures symbol (free live price) and the GICS sectors
# whose holdings they drive — an evidence-based linkage (e.g. crude oil drives
# Energy-sector revenues), so a commodity event reaches equity holdings via
# sector. Debt instruments link to their issuer country, so a country event
# reaches its sovereign/corporate debt. This is the first proof that the exposure
# engine generalizes beyond equities; it is deliberately small and grows with
# real holdings, never fabricated.

commodities:
- slug: crude-oil-wti
  name: Crude Oil (WTI)
  category: Energy
  symbol: CL=F
  affects_sectors: [Energy]
