# Tracked companies. Optional live-EDGAR fields (ignored in offline/reference
# mode, i.e. unless CORUSCANT_LIVE_SOURCES includes sec_edgar):
#   cik:          SEC central index key (identity; omit for private companies)
#   sec_filings:  real SEC filing document/index URLs, oldest → newest, so the
#                 change detector sees a prior + current disclosure. Example:
#                   sec_filings:
#                     - https://www.sec.gov/Archives/edgar/data/320193/.../aapl-2024.htm
#                     - https://www.sec.gov/Archives/edgar/data/320193/.../aapl-2025.htm
companies:
  - slug: apple
    name: Apple
    aliases: ["AAPL", "Apple Inc."]
    industry: Technology
    country: United States
  - slug: microsoft
    name: Microsoft
    aliases: ["MSFT", "Microsoft Corporation"]
    industry: Technology
    country: United States
  - slug: tesla
    name: Tesla
    aliases: ["TSLA", "Tesla, Inc."]
    industry: Automotive
    country: United States
  - slug: exxonmobil
    name: ExxonMobil
    aliases: ["XOM", "Exxon Mobil Corporation"]
    industry: Energy
    country: United States
  - slug: cargill
    name: Cargill
    aliases: ["Cargill, Incorporated"]
    industry: Agriculture
    country: United States
  - slug: spacex
