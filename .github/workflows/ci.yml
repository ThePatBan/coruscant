name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint, types, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check src tests
      - name: Mypy
        run: python -m mypy src
      - name: Pytest
        run: python -m pytest -q

  console:
    name: Console (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - name: Install
        run: npm ci
      - name: Test (vitest)
        run: npm test
      - name: Build (tsc + vite)
        run: npm run build

  admin:
    name: Admin (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - name: Install
        run: npm ci
      - name: Test (vitest)
        run: npm test
      - name: Build (tsc + vite)
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t coruscant-api:ci .
      - name: Build web image
        run: docker build -f apps/console/Dockerfile -t coruscant-web:ci ./apps/console
      - name: Build admin image
        run: docker build -f apps/admin/Dockerfile -t coruscant-admin:ci ./apps/admin
